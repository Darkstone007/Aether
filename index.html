<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AETHER</title>

    <!-- Main CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="welcome-body">

    <!-- Animated Background -->
    <div class="animated-bg"></div>

    <!-- Floating Glow Effects -->
    <div class="glow glow-one"></div>
    <div class="glow glow-two"></div>

    <!-- Welcome Container -->
    <section class="welcome-container">

        <!-- Logo -->
        <img src="assets/Logo.jpeg" alt="Aether Logo" class="main-logo">

        <!-- Main Text -->
        <div class="hero-content">

            <p class="small-title">
                SPECULATIVE NEURAL PRESENCE SYSTEM
            </p>

            <h1>
                WHERE YOU MEET ME,<br>
                AND I MEET YOU.
            </h1>

            <p class="hero-description">
                Aether is a non-invasive wearable neural presence system designed
                to reconnect people across distance through shared sensory and
                emotional immersion.
            </p>

            <!-- Feature Pills -->
            <div class="hero-pills">
                <span>Neural Presence</span>
                <span>Spatial Audio</span>
                <span>Emotional Resonance</span>
                <span>Privacy First</span>
            </div>

            <!-- Enter Button -->
            <a href="home.html" class="enter-button">
                ENTER AETHER
            </a>

        </div>

        <!-- Hero Image -->
        <div class="hero-image-wrapper">
            <img src="assets/welcome.jpeg" alt="Aether Welcome" class="hero-image">
        </div>

    </section>

    <script src="script.js"></script>
</body>
</html>
